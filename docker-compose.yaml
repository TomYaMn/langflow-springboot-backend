version: '3.8'

services:
  # 1. Database Service (From your docker run command)
  mysql-db:
    image: mysql:8.0
    container_name: intranet-langflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: langflow_intranet
      MYSQL_USER: langflow
      MYSQL_PASSWORD: langflow
    volumes:
      - langflow-mysql-data:/var/lib/mysql
    ports:
      - "3310:3306"
    restart: unless-stopped

  # 2. Spring Boot Backend
  backend:
    # CHANGE THIS: Replace with your actual GitHub username
    image: ghcr.io/tomyamn/langflow-springboot-backend:latest
    container_name: intranet-langflow-springboot-backend
    ports:
      - "8080:8080"
    environment:
      # We use 'mysql-db:3306' here because Docker automatically routes it internally!
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/langflow_intranet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql-db
    restart: unless-stopped

  # 3. React Frontend
  frontend:
    # CHANGE THIS: Replace with your actual GitHub username
    image: ghcr.io/tomyamn/langflow-springboot-backend:latest
    container_name: intranet-langflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

# This tells Docker to create and manage the persistent database volume
volumes:
  langflow-mysql-data: