name: Build and Push Backend to GHCR

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # REQUIRED: Grants the workflow permission to upload to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # CHANGE THIS: Replace 'yourgithubusername' with your actual username (lowercase!)
          tags: ghcr.io/tomyamn/langflow-springboot-backend:latest
          # Bonus: This caches your Docker layers in GitHub Actions to make future builds much faster
          cache-from: type=gha
          cache-to: type=gha,mode=max