spring.application.name=langflow-intranet-springboot

spring.datasource.url=jdbc:mysql://192.168.0.152:3310/langflow_intranet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=langflow
spring.datasource.password=langflow
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Optional but recommended for Spring Data JPA (Hibernate)
spring.jpa.hibernate.ddl-auto=validate
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml
spring.jpa.show-sql=true

logging.level.liquibase=INFO